name: Update Module Graph

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

jobs:
  update-graph:
    name: Generate Module Graph
    runs-on: ubuntu-latest

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Android build environment
        uses: ./.github/actions/setup-android

      - name: Setup project secrets
        uses: ./.github/actions/setup-secrets
        with:
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Generate module graph
        run: gradle createModuleGraph --build-cache

      - name: Commit if changed
        run: |
          git diff --quiet docs/MODULE_GRAPH.md && exit 0
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/MODULE_GRAPH.md
          git commit -m "docs: update module dependency graph"
          git push
