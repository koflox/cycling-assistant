name: Module Graph

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - 'mkdocs.yml'
      - '**/*.md'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

jobs:
  module-graph:
    name: Generate Module Graph
    runs-on: ubuntu-latest

    steps:
      # Checkout the PR head branch directly (not the merge commit) so we can push back.
      # Same-repo PRs only — GITHUB_TOKEN cannot push to forks.
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Android build environment
        uses: ./.github/actions/setup-android

      - name: Setup project secrets
        uses: ./.github/actions/setup-secrets
        with:
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Generate module graph
        run: ./gradlew createModuleGraph --build-cache

      # Commit the regenerated graph straight into the PR head branch. Push uses GITHUB_TOKEN,
      # which intentionally does NOT trigger pull_request workflows again — no re-run loop.
      - name: Commit + push if graph changed
        run: |
          git diff --quiet docs/MODULE_GRAPH.md && exit 0
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/MODULE_GRAPH.md
          git commit -m "docs: update module dependency graph"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
