name: Module Graph

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

jobs:
  module-graph:
    name: Generate Module Graph
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Android build environment
        uses: ./.github/actions/setup-android

      - name: Setup project secrets
        uses: ./.github/actions/setup-secrets
        with:
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Generate module graph
        run: ./gradlew createModuleGraph --build-cache

      - name: Create PR if changed
        if: github.event_name == 'push'
        run: |
          git diff --quiet docs/MODULE_GRAPH.md && exit 0
          BRANCH="auto/update-module-graph"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git checkout -b "$BRANCH"
          git add docs/MODULE_GRAPH.md
          git commit -m "docs: update module dependency graph"
          git push -f origin "$BRANCH"
          gh pr create --title "docs: update module dependency graph" --body "Auto-generated module graph update." --base main --head "$BRANCH" || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
