name: Release APK

# Reusable workflow — invoked by main-pipeline.yml (Stage 2). Reuses the Gradle/build
# cache warmed by Build & Cache.

on:
  workflow_call:

env:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.caching=true"

jobs:
  release:
    name: Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Android build environment
        uses: ./.github/actions/setup-android

      - name: Setup project secrets
        uses: ./.github/actions/setup-secrets
        with:
          google-services-json: ${{ secrets.GOOGLE_SERVICES_JSON }}
          maps-api-key: ${{ secrets.MAPS_API_KEY }}
          strava-client-id: ${{ secrets.STRAVA_CLIENT_ID }}
          strava-client-secret: ${{ secrets.STRAVA_CLIENT_SECRET }}
          release-keystore: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          release-keystore-password: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          release-key-alias: ${{ secrets.RELEASE_KEY_ALIAS }}
          release-key-password: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Read version
        id: version
        run: |
          VERSION_CODE=$(grep 'versionCode' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          VERSION_NAME=$(grep 'versionName' version.properties | cut -d'=' -f2 | tr -d '[:space:]')
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION_NAME ($VERSION_CODE)"

      - name: Lint release variant
        # Catches manifest/resource/api-misuse issues before the APK is built. Default
        # `abortOnError=true` fails the job on any lint error (e.g., Instantiatable rule
        # would flag a missing class referenced from AndroidManifest <service>/<activity>).
        run: ./gradlew :app:lintRelease --build-cache

      - name: Upload lint report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: lint-report-release
          path: app/build/reports/lint-results-release.html
          retention-days: 7

      - name: Build release APKs
        # Produces per-ABI APKs + a universal APK in app/build/outputs/apk/release/
        # (arm64-v8a, x86_64, universal). See `splits.abi` block in app/build.gradle.kts.
        run: ./gradlew assembleRelease --build-cache

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          generate_release_notes: true
          # Wildcard uploads all generated APKs (arm64-v8a, x86_64, universal).
          files: app/build/outputs/apk/release/*.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v7
        with:
          name: app-release-v${{ steps.version.outputs.name }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
