name: Deploy Docs

# Invoked by main-pipeline.yml (Stage 1) on docs changes, and runnable manually.
# The push trigger lives in the orchestrator, which gates this on docs/mkdocs changes.

on:
  workflow_call:
  workflow_dispatch:

# Applies to manual (workflow_dispatch) runs; for workflow_call the caller job grants
# the equivalent permissions.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - run: pip install mkdocs-material

      - run: mkdocs build

      - uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
